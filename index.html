<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RE/MAX Property Explorer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="navbar">
  <div class="nav-container">

    <div class="nav-logo">
      <span class="logo-remax">
  <img src="img/Remaxlogoblanco.png" class="logo-img">
</span>
    </div>

    <ul class="nav-menu">
      <li class="menu-item">
        <span>Quiero comprar ▾</span>
        <div class="dropdown">
          <p>Simulador hipotecario</p>
          <p>FOVISSSTE</p>
          <p>INFONAVIT</p>
        </div>
      </li>

      <li class="menu-item">
        <span>Aviso de privacidad ▾</span>
        <div class="dropdown">
          <p>Contrato NOM 247</p>
          <p>Código de ética</p>
        </div>
      </li>

      <li class="menu-item">Agentes Victoriosos</li>
      <li class="menu-item">Contacto</li>
    </ul>

    <div class="nav-search">
      <div class="search-box">
        <input type="text" class="search-text" placeholder="Buscar...">
        <a href="#" class="search-btn">
          <img src="img/lupa1.png" class="search-icon">
        </a>
      </div>
    </div>

  </div>
</nav>

<section class="hero">
  <div class="hero-overlay">
    <div class="hero-content">
      <h2>¿Deseas comprar casa con algún tipo de crédito?</h2>
      <div class="hero-buttons">
        <button onclick="fetchAllProperties()">Crédito Bancario</button>
        <button onclick="fetchAllProperties()">FOVISSSTE</button>
        <button onclick="fetchAllProperties()">INFONAVIT</button>
      </div>
    </div>
  </div>
</section>

<div class="container">

  <h2 class="section-title">Propiedades recientes</h2>

  <div class="filter-bar">

    <div class="filter-item">
      <label>Ubicación</label>
      <input type="text" id="searchLocation">
    </div>

    <div class="filter-item">
      <label>Precio</label>
      <select id="priceRange">
        <option value="">Todos</option>
        <option value="1">Hasta $1M</option>
        <option value="2">Hasta $3M</option>
        <option value="3">Más de $3M</option>
      </select>
    </div>

    <div class="filter-item">
      <label>Tipo</label>
      <select id="category">
        <option value="">Todos</option>
        <option value="casa">Casa</option>
        <option value="departamento">Departamento</option>
        <option value="terreno">Terreno</option>
      </select>
    </div>

    <button class="filter-btn-search" onclick="applyFilters()"><img src="img/lupa1.png" class="search-icon"></button>

  </div>

  <div id="results" class="property-grid"></div>

</div>

<script src="app.js"></script>
</body>
</html>
